<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Persona - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 id="form-title">Registrar Persona</h3>
      <a href="/pages/persons-list.html" class="btn btn-outline-secondary">Volver al listado</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form id="person-form">
          <input type="hidden" id="person-id">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre *</label>
              <input type="text" class="form-control" id="nombre" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Apellido *</label>
              <input type="text" class="form-control" id="apellido" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Equipo *</label>
              <input type="text" class="form-control" id="equipo" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Documento / ID *</label>
              <input type="text" class="form-control" id="documentoId" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Fecha de nacimiento</label>
              <input type="date" class="form-control" id="fechaNacimiento">
            </div>
            <div class="col-md-6">
              <label class="form-label">Número de camiseta</label>
              <input type="number" class="form-control" id="numeroCamiseta" min="0">
            </div>
          </div>

          <hr class="my-4">

          <h5>Fotografía <span class="text-muted fs-6 fw-normal">(opcional)</span></h5>
          <ul class="nav nav-tabs mb-3" id="photoTabs">
            <li class="nav-item">
              <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-upload" type="button">Subir archivo</button>
            </li>
            <li class="nav-item">
              <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-webcam" type="button" id="webcam-tab-btn">Usar cámara</button>
            </li>
          </ul>
          <div class="tab-content mb-3">
            <div class="tab-pane fade show active" id="tab-upload">
              <input type="file" class="form-control" id="foto-file" accept="image/jpeg,image/png,image/webp">
            </div>
            <div class="tab-pane fade" id="tab-webcam">
              <div class="d-flex gap-3 align-items-start flex-wrap">
                <video id="webcam-video" class="webcam-video" autoplay playsinline></video>
                <canvas id="webcam-canvas" class="webcam-canvas d-none"></canvas>
                <div class="d-flex flex-column gap-2">
                  <button type="button" class="btn btn-secondary btn-sm" id="btn-start-camera">Activar cámara</button>
                  <button type="button" class="btn btn-primary btn-sm" id="btn-capture-photo" disabled>Capturar foto</button>
                </div>
              </div>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label d-block">Vista previa</label>
            <img id="photo-preview" class="photo-preview" src="../images/placeholder-photo.svg" alt="preview">
          </div>

          <div id="form-error" class="alert alert-danger d-none"></div>

          <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/webcam-capture.js"></script>
  <script src="../js/person-form.js"></script>
</body>
</html>
