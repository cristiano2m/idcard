<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración de Usuarios - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Usuarios</h3>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" id="btn-new-user">+ Nuevo Usuario</button>
    </div>

    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Activo</th><th>Último login</th><th>Acciones</th></tr></thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="user-form">
          <div class="modal-header">
            <h5 class="modal-title" id="user-modal-title">Nuevo Usuario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="u-id">
            <div class="mb-2">
              <label class="form-label">Usuario</label>
              <input type="text" class="form-control" id="u-username" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-control" id="u-fullname" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Rol</label>
              <select class="form-select" id="u-role" required>
                <option value="Administrador">Administrador</option>
                <option value="Operador">Operador</option>
                <option value="Supervisor">Supervisor</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label" id="u-password-label">Contraseña</label>
              <input type="password" class="form-control" id="u-password">
            </div>
            <div class="form-check" id="u-active-wrap">
              <input class="form-check-input" type="checkbox" id="u-active" checked>
              <label class="form-check-label">Activo</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/admin-users.js"></script>
</body>
</html>
