<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licencia - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container" style="max-width:540px; margin-top:3rem;">
    <div class="card shadow-sm">
      <div class="card-header bg-brand text-white">
        <h5 class="mb-0">Activación de Licencia</h5>
      </div>
      <div class="card-body">

        <!-- Estado actual -->
        <div id="status-box" class="alert mb-4" style="display:none"></div>

        <!-- Formulario de activación (solo admin) -->
        <div id="activate-section" style="display:none">
          <label class="form-label fw-semibold">Código de activación</label>
          <p class="text-muted small">Ingresa el código que recibiste para activar o renovar la licencia.</p>
          <div class="input-group">
            <input type="text" id="inp-code" class="form-control font-monospace text-uppercase"
              placeholder="IDCARD-YYYYMMDD-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
              autocomplete="off" spellcheck="false" maxlength="50">
            <button class="btn btn-primary" id="btn-activate">Activar</button>
          </div>
          <div id="activate-error" class="text-danger small mt-2" style="display:none"></div>
        </div>

        <!-- Mensaje para no-admin cuando expiró -->
        <div id="no-access-msg" style="display:none">
          <p class="text-muted">Contacta al administrador del sistema para renovar la licencia.</p>
        </div>

      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      Credenciales PVC &mdash; Sistema de registro
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/license.js"></script>
</body>
</html>
