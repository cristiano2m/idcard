<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Persona - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Detalle de Persona</h3>
      <a href="/pages/persons-list.html" class="btn btn-outline-secondary">Volver al listado</a>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row">
          <div class="col-md-3 text-center">
            <img id="d-foto" class="photo-preview mb-2" style="width:180px;height:180px" src="../images/placeholder-photo.svg">
            <div><span id="d-estado-badge"></span></div>
          </div>
          <div class="col-md-9">
            <dl class="row mb-0">
              <dt class="col-sm-4">Nombre completo</dt><dd class="col-sm-8" id="d-nombre"></dd>
              <dt class="col-sm-4">Equipo</dt><dd class="col-sm-8" id="d-equipo"></dd>
              <dt class="col-sm-4">Documento</dt><dd class="col-sm-8" id="d-documento"></dd>
              <dt class="col-sm-4">Fecha de nacimiento</dt><dd class="col-sm-8" id="d-nacimiento"></dd>
              <dt class="col-sm-4">Número de camiseta</dt><dd class="col-sm-8" id="d-camiseta"></dd>
            </dl>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="card shadow-sm mb-3">
          <div class="card-header bg-white">Código QR</div>
          <div class="card-body text-center"><img id="d-qr" style="max-width:200px"></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm mb-3">
          <div class="card-header bg-white">Código de Barras</div>
          <div class="card-body text-center"><svg id="d-barcode"></svg></div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        Cambiar estado
      </div>
      <div class="card-body d-flex gap-2">
        <button class="btn btn-warning btn-sm" data-estado="Pendiente">Marcar Pendiente</button>
        <button class="btn btn-success btn-sm" data-estado="Impreso">Marcar Impreso</button>
        <button class="btn btn-danger btn-sm" data-estado="Cancelado">Marcar Cancelado</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/qr-barcode-preview.js"></script>
  <script src="../js/person-detail.js"></script>
</body>
</html>
