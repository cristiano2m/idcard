<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablero de Actualizaciones - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
  <style>
    .sort-th { cursor: pointer; user-select: none; white-space: nowrap; }
    .sort-th:hover { background-color: #e9ecef; }
    .sort-th.active { color: var(--bs-primary); }
    .sort-icon { font-size: .75rem; opacity: .6; margin-left: 3px; }
    .sort-th.active .sort-icon { opacity: 1; }
    .row-mod td { background-color: #e8f8ea !important; }
    .row-mod td:first-child { border-left: 4px solid #198754; }
    .panel-title { font-size: 1rem; font-weight: 600; letter-spacing: .02em; }
  </style>
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container-fluid pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3 px-2 flex-wrap gap-2">
      <h3 class="mb-0">Tablero de actualizaciones</h3>
      <div class="d-flex align-items-center gap-2">
        <label class="mb-0 small text-muted">Fecha:</label>
        <input type="date" class="form-control form-control-sm" id="f-fecha" style="width:160px">
        <button class="btn btn-outline-secondary btn-sm" id="btn-all-dates">Todas</button>
        <button class="btn btn-outline-secondary btn-sm" id="btn-refresh">↺ Actualizar</button>
      </div>
    </div>

    <div class="row g-3">

      <!-- MODIFICADOS -->
      <div class="col-xl-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-2">
            <span class="panel-title">✏️ Modificados</span>
            <span class="badge bg-white text-success fs-6" id="badge-mod">0</span>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0" id="tbl-mod">
              <thead class="table-light">
                <tr>
                  <th class="sort-th" data-table="mod" data-col="nombre">Nombre <span class="sort-icon">⇅</span></th>
                  <th class="sort-th" data-table="mod" data-col="equipo">Equipo <span class="sort-icon">⇅</span></th>
                  <th class="sort-th" data-table="mod" data-col="updated_at">Modificado <span class="sort-icon">⇅</span></th>
                  <th style="width:100px"></th>
                </tr>
              </thead>
              <tbody id="tbody-mod"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- IMPRESOS -->
      <div class="col-xl-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-2">
            <span class="panel-title">🖨️ Impresos</span>
            <span class="badge bg-white text-primary fs-6" id="badge-imp">0</span>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0" id="tbl-imp">
              <thead class="table-light">
                <tr>
                  <th class="sort-th" data-table="imp" data-col="nombre">Nombre <span class="sort-icon">⇅</span></th>
                  <th class="sort-th" data-table="imp" data-col="equipo">Equipo <span class="sort-icon">⇅</span></th>
                  <th class="sort-th" data-table="imp" data-col="updated_at">Modificado <span class="sort-icon">⇅</span></th>
                  <th class="sort-th" data-table="imp" data-col="printed_at">Impreso <span class="sort-icon">⇅</span></th>
                </tr>
              </thead>
              <tbody id="tbody-imp"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/updates-board.js"></script>
</body>
</html>
