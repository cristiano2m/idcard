<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablero de Actualizaciones - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
  <style>
    .table-modificado td { background-color: #d1f5d3; }
    .col-panel { display: flex; flex-direction: column; }
    .panel-header { font-size: 1.1rem; font-weight: 600; padding: .5rem 0 .75rem; }
  </style>
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container-fluid pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3 px-2">
      <h3 class="mb-0">Tablero de actualizaciones</h3>
      <button class="btn btn-outline-secondary btn-sm" id="btn-refresh">↺ Actualizar</button>
    </div>

    <div class="row g-3">
      <!-- Columna MODIFICADOS -->
      <div class="col-lg-6 col-panel">
        <div class="panel-header text-success">
          Modificados &nbsp;<span class="badge bg-success" id="badge-mod">0</span>
        </div>
        <div class="card shadow-sm flex-grow-1">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th><th>Nombre</th><th>Equipo</th><th>Modificado</th><th></th>
                </tr>
              </thead>
              <tbody id="tbody-mod"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Columna IMPRESOS -->
      <div class="col-lg-6 col-panel">
        <div class="panel-header text-primary">
          Impresos &nbsp;<span class="badge bg-primary" id="badge-imp">0</span>
        </div>
        <div class="card shadow-sm flex-grow-1">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th><th>Nombre</th><th>Equipo</th><th>Modificado</th><th>Impreso</th>
                </tr>
              </thead>
              <tbody id="tbody-imp"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/updates-board.js"></script>
</body>
</html>
