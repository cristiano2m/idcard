<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor MDB - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Registros en el MDB activo</h3>
      <a href="/pages/admin-settings.html" class="btn btn-outline-secondary">Volver a Configuración</a>
    </div>

    <div id="mdb-source-info" class="alert alert-info small"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-6">
            <input type="text" class="form-control" id="f-nombre" placeholder="Buscar por nombre o apellido">
          </div>
          <div class="col-md-6">
            <select class="form-select" id="f-equipo">
              <option value="">Todos los equipos</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="sortable" data-col="recordId" style="cursor:pointer;user-select:none">ID <span class="sort-icon"></span></th>
              <th class="sortable" data-col="nombre" style="cursor:pointer;user-select:none">Nombre <span class="sort-icon"></span></th>
              <th class="sortable" data-col="equipo" style="cursor:pointer;user-select:none">Equipo <span class="sort-icon"></span></th>
              <th class="sortable" data-col="numero" style="cursor:pointer;user-select:none">Nº <span class="sort-icon"></span></th>
              <th class="sortable" data-col="fecha" style="cursor:pointer;user-select:none">Fecha Nac. <span class="sort-icon"></span></th>
              <th class="sortable" data-col="estado" style="cursor:pointer;user-select:none">Estado <span class="sort-icon"></span></th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="mdb-table-body"></tbody>
        </table>
      </div>
      <div class="card-footer bg-white d-flex justify-content-between align-items-center">
        <span id="pagination-info" class="text-muted small"></span>
        <div>
          <button class="btn btn-sm btn-outline-secondary" id="btn-prev">Anterior</button>
          <button class="btn btn-sm btn-outline-secondary" id="btn-next">Siguiente</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de edición -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar registro MDB <span id="edit-record-id" class="text-muted small"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="edit-form" novalidate>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="edit-first-name" required>
              </div>
              <div class="col-6">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control" id="edit-last-name" required>
              </div>
              <div class="col-8">
                <label class="form-label">Equipo</label>
                <input type="text" class="form-control" id="edit-team-name">
              </div>
              <div class="col-4">
                <label class="form-label">Número</label>
                <input type="number" class="form-control" id="edit-shirt" min="0">
              </div>
              <div class="col-6">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" class="form-control" id="edit-dob">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-save-edit">Guardar cambios</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/mdb-viewer.js"></script>
</body>
</html>
