<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor MDB - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Registros en el MDB activo</h3>
      <a href="/pages/admin-settings.html" class="btn btn-outline-secondary">Volver a Configuración</a>
    </div>

    <div id="mdb-source-info" class="alert alert-info small"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <input type="text" class="form-control" id="f-nombre" placeholder="Buscar por nombre o apellido">
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr><th>RecordID</th><th>Nombre</th><th>Equipo</th><th>Documento</th><th>Fecha Nac.</th><th>Estado</th></tr>
          </thead>
          <tbody id="mdb-table-body"></tbody>
        </table>
      </div>
      <div class="card-footer bg-white d-flex justify-content-between align-items-center">
        <span id="pagination-info" class="text-muted small"></span>
        <div>
          <button class="btn btn-sm btn-outline-secondary" id="btn-prev">Anterior</button>
          <button class="btn btn-sm btn-outline-secondary" id="btn-next">Siguiente</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/mdb-viewer.js"></script>
</body>
</html>
