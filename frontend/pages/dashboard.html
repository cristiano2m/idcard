<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3>Dashboard</h3>
      <a href="/pages/person-form.html" class="btn btn-primary">+ Nueva Persona</a>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card card-stat">
          <div class="card-body">
            <div class="text-muted small">Total registrados</div>
            <div class="stat-value" id="stat-total">-</div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-stat">
          <div class="card-body">
            <div class="text-muted small">Pendientes</div>
            <div class="stat-value text-warning" id="stat-pendiente">-</div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-stat">
          <div class="card-body">
            <div class="text-muted small">Impresas</div>
            <div class="stat-value text-success" id="stat-impreso">-</div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-stat">
          <div class="card-body">
            <div class="text-muted small">Canceladas</div>
            <div class="stat-value text-danger" id="stat-cancelado">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white">Últimos registros</div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr><th>Nombre</th><th>Equipo</th><th>Documento</th><th>Estado</th><th>Fecha</th></tr>
          </thead>
          <tbody id="recent-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
