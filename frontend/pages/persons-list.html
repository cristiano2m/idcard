<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personas - Credenciales PVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/theme.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app-navbar"></div>

  <div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Personas registradas</h3>
      <a href="/pages/person-form.html" class="btn btn-primary">+ Nueva Persona</a>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-3"><input type="text" class="form-control" id="f-nombre" placeholder="Nombre o apellido"></div>
          <div class="col-md-3"><input type="text" class="form-control" id="f-equipo" placeholder="Equipo"></div>
          <div class="col-md-2"><input type="text" class="form-control" id="f-documento" placeholder="Documento/Código"></div>
          <div class="col-md-2">
            <select class="form-select" id="f-estado">
              <option value="">Todos los estados</option>
              <option value="Pendiente">Pendiente</option>
              <option value="Impreso">Impreso</option>
              <option value="Cancelado">Cancelado</option>
            </select>
          </div>
          <div class="col-md-2"><input type="date" class="form-control" id="f-fecha"></div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr><th>Nombre</th><th>Equipo</th><th>Documento</th><th>Camiseta</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr>
          </thead>
          <tbody id="persons-table-body"></tbody>
        </table>
      </div>
      <div class="card-footer bg-white d-flex justify-content-between align-items-center">
        <span id="pagination-info" class="text-muted small"></span>
        <div>
          <button class="btn btn-sm btn-outline-secondary" id="btn-prev">Anterior</button>
          <button class="btn btn-sm btn-outline-secondary" id="btn-next">Siguiente</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/common/api-client.js"></script>
  <script src="../js/common/auth-guard.js"></script>
  <script src="../js/common/navbar.js"></script>
  <script src="../js/common/toast.js"></script>
  <script src="../js/common/utils.js"></script>
  <script src="../js/persons-list.js"></script>
</body>
</html>
